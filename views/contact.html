<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact & Email Notification</title>
    <link rel="stylesheet" href="/css/style.css"> </head>
<body>
    <div class="form-container">
        <h2>Send Us a Message</h2>
        <form action="/send-email" method="POST">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" name="senderName" required>
            </div>
            <div class="form-group">
                <label>Your Email</label>
                <input type="email" name="senderEmail" required>
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" name="subject" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="4" style="width: 100%; border-radius: 8px; border: 1px solid #ddd; padding: 10px;"></textarea>
            </div>
            <button type="submit">Send Email Now</button>
        </form>
    </div>
</body>
</html>
