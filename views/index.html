<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="form-container">
        <h2>User Registration</h2>
        <form action="/submit" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="userEmail" placeholder="example@mail.com" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phoneNo" placeholder="+91 00000-00000" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob">
            </div>

            <div class="form-group">
                <label>Current Address</label>
                <input type="text" name="address" placeholder="City, State, Pincode" required>
            </div>

            <div class="form-group">
                <label>Create Password</label>
                <input type="password" name="userPassword" placeholder="••••••••" required>
            </div>

            <button type="submit">Register Now</button>
        </form>
    </div>

</body>
</html>
